<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Image Search</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Image Search Engine</h1>
      <p>ESTR3302 Project</p>
    </header>

    <main class="container">
      <section class="panel">
        <h2>Search</h2>
        <div class="search-row">
          <input id="searchInput" type="text" placeholder="Semantic search (embeds your query)…" />
          <button id="searchBtn">Search</button>
        </div>
      </section>

      <section class="panel">
        <h2>Upload Content</h2>
        <div class="upload-row">
          <input id="titleInput" type="text" placeholder="Optional title" />
          <input id="fileInput" type="file" accept="image/*" />
          <button id="uploadBtn">Upload Image</button>
        </div>
        <p class="hint">Supported: image files only.</p>
      </section>

      <section class="panel">
        <h2>Results</h2>
        <div id="results" class="results-grid"></div>
      </section>

      <section class="panel debug-panel">
        <div class="debug-header">
          <h2>🔍 Debug Log</h2>
          <button id="clearLogBtn" class="clear-log-btn">Clear</button>
        </div>
        <div id="debugLog" class="debug-log"></div>
      </section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <button id="closeModal" class="close-btn">×</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
